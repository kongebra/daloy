# Container + IaC security scan generated by create-daloy --with-ci.
#
# The Deno template has no npm package manager, but its Dockerfile and any
# IaC files (Terraform / Kubernetes / Helm / CloudFormation) the project
# adds still deserve the same review as Node-based scaffolds. Modeled on
# Aikido's "IaC security scanning for Terraform & Kubernetes
# misconfigurations" article
# (https://www.aikido.dev/blog/iac-security-scanning-terraform-kubernetes-misconfigurations):
#
#   - hadolint lints the Dockerfile for known anti-patterns and unsafe
#     instructions (CIS Docker Benchmark coverage).
#   - Trivy filesystem scan with the `misconfig` scanner enabled catches
#     IaC misconfigurations (Terraform, Kubernetes, Helm, Dockerfile,
#     CloudFormation) plus secrets and vulnerable lockfile entries. It
#     runs even when no Dockerfile is present, so a project that only
#     ships Terraform / K8s still gets the Aikido-style posture review.
#   - Trivy image scan covers OS + language CVEs once the image is built.
#   - SARIF results are uploaded to the Code Scanning tab so findings show
#     up in the same place as CodeQL.

name: Container scan

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deno.json"
      - "deno.lock"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - "k8s/**"
      - "helm/**"
      - "**/deployment.yaml"
      - "**/deployment.yml"
      - "**/kustomization.yaml"
      - "**/kustomization.yml"
      - "**/Chart.yaml"
      - "**/values.yaml"
      - ".github/workflows/container-scan.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "deno.json"
      - "deno.lock"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - "k8s/**"
      - "helm/**"
      - "**/deployment.yaml"
      - "**/deployment.yml"
      - "**/kustomization.yaml"
      - "**/kustomization.yml"
      - "**/Chart.yaml"
      - "**/values.yaml"
      - ".github/workflows/container-scan.yml"
  schedule:
    # Weekly run catches newly-disclosed base-image CVEs even when the
    # Dockerfile itself has not changed.
    - cron: "17 6 * * 1"

permissions: {}

concurrency:
  group: container-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Lint + scan container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile found at the repo root; skipping container scan."
          fi

      - name: Pin check (FROM @sha256 digest)
        # Floating tags like `denoland/deno:alpine` silently re-resolve to
        # fresh digests on every build. Pinning `FROM <image>@sha256:<digest>`
        # makes the base reproducible; the Docker Dependabot ecosystem then
        # opens PRs when newer digests are published.
        if: steps.detect.outputs.present == 'true'
        run: |
          unpinned=0
          while IFS= read -r line; do
            ref="${line#FROM }"
            ref="${ref#from }"
            ref="${ref%% AS *}"
            ref="${ref%% as *}"
            ref="${ref## }"
            ref="${ref%% }"
            case "$ref" in
              scratch|"\${"*|*"@sha256:"*) ;;
              *)
                echo "::warning file=Dockerfile::FROM '$ref' is not pinned to a @sha256:<digest>. Override at build time with --build-arg DENO_IMAGE=denoland/deno:alpine@sha256:<digest> or hard-code the digest and let Dependabot keep it fresh."
                unpinned=$((unpinned + 1))
                ;;
            esac
          done < <(grep -E '^(FROM|from) ' Dockerfile || true)
          if [ "$unpinned" -gt 0 ]; then
            echo "::notice::$unpinned unpinned FROM line(s)."
          fi

      - name: Lint Dockerfile (hadolint)
        if: steps.detect.outputs.present == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true

      - name: Upload hadolint SARIF
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Trivy filesystem scan (IaC misconfig + secrets + vulns)
        # `misconfig` is the IaC posture scanner — Terraform, Kubernetes,
        # Helm, Dockerfile, CloudFormation — per Aikido's "IaC security
        # scanning for Terraform & Kubernetes misconfigurations" article.
        # It runs unconditionally so a project that only ships Terraform
        # or K8s (no Dockerfile) still gets reviewed on every PR.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build image (no push)
        if: steps.detect.outputs.present == 'true'
        run: |
          docker build --pull --load -t local/app:scan .

      - name: Trivy image scan
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/app:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          exit-code: "1"
          vuln-type: os,library

      - name: Upload Trivy image SARIF
        if: always() && steps.detect.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@52485aec7be33610227643b0fe83936b8b5f061a # v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
