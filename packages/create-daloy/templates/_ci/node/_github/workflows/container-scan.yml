# Container + IaC security scan generated by create-daloy --with-ci.
#
# Inspired by the controls in
# https://snyk.io/blog/scale-container-security-effortlessly/ and
# Aikido's "IaC security scanning for Terraform & Kubernetes
# misconfigurations"
# (https://www.aikido.dev/blog/iac-security-scanning-terraform-kubernetes-misconfigurations)
# — but built only from SHA-pinned, free, open-source GitHub Actions:
#
#   - hadolint lints the Dockerfile for known anti-patterns and unsafe
#     instructions (CIS Docker Benchmark coverage).
#   - Trivy filesystem scan with the `misconfig` scanner enabled catches
#     IaC misconfigurations in Terraform (`*.tf` / `*.tfvars`),
#     Kubernetes manifests (`k8s/**`, `deployment.yaml`,
#     `kustomization*.yaml`), Helm charts, Dockerfiles, and
#     CloudFormation templates — plus secrets and vulnerable lockfile
#     entries. This runs even when no Dockerfile is present, so a
#     project that only ships Terraform / K8s still gets the Aikido-style
#     IaC posture review on every PR.
#   - Trivy image scan covers OS + language CVEs once the image is built.
#   - SARIF results are uploaded to the Code Scanning tab so findings show
#     up in the same place as CodeQL.
#
# The Dockerfile-specific steps (hadolint, build, image scan) are a no-op
# if the project has no Dockerfile at the repo root.

name: Container scan

on:
  pull_request:
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "package-lock.json"
      - "yarn.lock"
      - "bun.lock"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - "k8s/**"
      - "helm/**"
      - "**/deployment.yaml"
      - "**/deployment.yml"
      - "**/kustomization.yaml"
      - "**/kustomization.yml"
      - "**/Chart.yaml"
      - "**/values.yaml"
      - ".github/workflows/container-scan.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "package.json"
      - "pnpm-lock.yaml"
      - "package-lock.json"
      - "yarn.lock"
      - "bun.lock"
      - "**/*.tf"
      - "**/*.tfvars"
      - "**/*.hcl"
      - "k8s/**"
      - "helm/**"
      - "**/deployment.yaml"
      - "**/deployment.yml"
      - "**/kustomization.yaml"
      - "**/kustomization.yml"
      - "**/Chart.yaml"
      - "**/values.yaml"
      - ".github/workflows/container-scan.yml"
  schedule:
    # Weekly run catches newly-disclosed base-image CVEs even when the
    # Dockerfile itself hasn't changed.
    - cron: "17 6 * * 1"

permissions: {}

concurrency:
  group: container-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    name: Lint + scan container
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Detect Dockerfile
        id: detect
        run: |
          if [ -f Dockerfile ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfile found at the repo root; skipping container scan."
          fi

      - name: Pin check (FROM @sha256 digest)
        # Aikido x Root.io ("Harden your containers without the headaches",
        # 2026) makes the point that a floating tag like `node:24-alpine`
        # silently re-resolves to a new digest on every build, so a
        # base-image CVE that lands tomorrow is invisible to today's
        # scan results. Pinning `FROM <image>@sha256:<digest>` makes the
        # base reproducible; the `docker` Dependabot ecosystem in
        # `.github/dependabot.yml` then opens a PR when a fresher digest
        # is published so the pin stays current instead of stale. This
        # step surfaces unpinned `FROM` lines as PR annotations without
        # failing the build, so a brand-new scaffold still goes green.
        if: steps.detect.outputs.present == 'true'
        run: |
          unpinned=0
          while IFS= read -r line; do
            ref="${line#FROM }"
            ref="${ref#from }"
            ref="${ref%% AS *}"
            ref="${ref%% as *}"
            ref="${ref## }"
            ref="${ref%% }"
            case "$ref" in
              scratch|"\${"*|*"@sha256:"*) ;;
              *)
                echo "::warning file=Dockerfile::FROM '$ref' is not pinned to a @sha256:<digest> — see Aikido x Root.io 'Harden your containers' (Daloy SECURITY.md → Container base-image hardening)."
                unpinned=$((unpinned + 1))
                ;;
            esac
          done < <(grep -E '^(FROM|from) ' Dockerfile || true)
          if [ "$unpinned" -gt 0 ]; then
            echo "::notice::$unpinned unpinned FROM line(s). Override at build time with --build-arg NODE_IMAGE=node:24-alpine@sha256:<digest> or hard-code the digest in the Dockerfile and let Dependabot keep it fresh."
          fi

      - name: Lint Dockerfile (hadolint)
        if: steps.detect.outputs.present == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint.sarif
          no-fail: true

      - name: Upload hadolint SARIF
        if: steps.detect.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: hadolint.sarif
          category: hadolint

      - name: Trivy filesystem scan (IaC misconfig + secrets + vulns)
        # `misconfig` is the IaC posture scanner — Terraform, Kubernetes,
        # Helm, Dockerfile, CloudFormation — per Aikido's "IaC security
        # scanning for Terraform & Kubernetes misconfigurations" article.
        # It runs unconditionally so a project that only ships Terraform
        # or K8s (no Dockerfile) still gets reviewed on every PR.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"

      - name: Upload Trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build image (no push)
        if: steps.detect.outputs.present == 'true'
        run: |
          # Tag locally so the scan step has something to point at.
          docker build --pull --load -t local/app:scan .

      - name: Trivy image scan
        if: steps.detect.outputs.present == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/app:scan
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          # Block merges only on CRITICAL by default; relax with `severity`
          # / `exit-code` if it gets noisy in your pipeline.
          exit-code: "1"
          vuln-type: os,library

      - name: Upload Trivy image SARIF
        if: always() && steps.detect.outputs.present == 'true'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
