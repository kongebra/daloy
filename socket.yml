# Socket.dev configuration — https://docs.socket.dev/docs/socket-yml
# Must live at the repo root. `version` is required and must be 2.
#
# SCOPE (important): socket.yml configures the Socket GitHub App for THIS
# repository's pull requests and dependency scans only. It does NOT change the
# public package report at https://socket.dev/npm/package/@daloyjs/core — that
# page is computed from Socket's own static analysis of the published npm
# tarball (socket.yml is not even shipped in the tarball), so the "Network
# access" capability marker shown there is expected and is NOT cleared by the
# `networkAccess: false` rule below. (`issueRules` is also deprecated upstream.)
# The "Network access" alert is a factual capability marker, not a vulnerability:
# any HTTP framework makes outbound requests. The real cross-ecosystem trust
# signal is provenance — @daloyjs/core (npm) and @daloyjs/daloy (JSR) both
# publish with SLSA / Sigstore provenance attestations.
version: 2

# Per-alert overrides. `issueRules` maps a Socket issue slug
# (https://socket.dev/npm/issue) to true (alert) or false (ignore).
# Omitted slugs fall back to the org/dashboard defaults.
issueRules:
  # "Network access" (https://socket.dev/alerts/networkAccess) is an expected
  # capability for @daloyjs/core, not a supply-chain risk. The framework
  # intentionally touches the network through:
  #   - fetchGuard()      (src/fetch-guard.ts)      SSRF-hardened outbound fetch
  #   - resilientFetch()  (src/fetch-resilience.ts) timeout/retry/circuit breaker
  #   - createWebhookSender() (src/webhook-delivery.ts) signed webhook delivery
  #   - JWKS fetching     (src/jwk.ts)              remote key-set retrieval
  # The package ships zero runtime dependencies and no install/lifecycle
  # scripts, so this acknowledged capability should not count against the score.
  networkAccess: false
