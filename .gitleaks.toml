title = "Daloy gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allow clearly fake bearer tokens used in docs and workshop curl examples."
targetRules = ["curl-auth-header"]
condition = "AND"
regexTarget = "match"
paths = [
  '''(?:^|/)website/app/docs/tutorials/bookstore/page\.tsx$''',
  '''(?:^|/)workshop/src/challenges/4-hour/(?:coding-steps/exercise-4-steps|instructions/(?:challenge-2-bug|exercise-4))\.md$''',
  '''(?:^|/)workshop/src/challenges/8-hour/(?:coding-steps/exercise-6-steps|instructions/(?:challenge-1-feature|exercise-5|exercise-6))\.md$''',
]
regexes = [
  '''(?i)authorization:[ \t]{0,5}bearer[ \t]{0,5}(?:demo-token|guess|wrong|admin-token|workshop-token|\$TOKEN|\$NONE_TOKEN)''',
]