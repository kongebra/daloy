# ClusterFuzzLite — fuzz code changes on every PR that touches the framework
# source or the fuzz harness. A new crash/regression fails the check.
# Docs: https://google.github.io/clusterfuzzlite/
name: ClusterFuzzLite (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite_pr.yml"

permissions: {}

jobs:
  Fuzzing:
    name: PR fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout the PR head
      actions: read # read the prior corpus from the Actions cache
      security-events: write # upload SARIF findings to code scanning
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: javascript
          sanitizer: none

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 300
          mode: code-change
          sanitizer: none
          output-sarif: true
