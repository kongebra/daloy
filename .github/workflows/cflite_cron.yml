# ClusterFuzzLite — scheduled batch fuzzing of the full corpus. Runs longer
# than the per-PR check and persists the growing corpus to the Actions cache.
# Docs: https://google.github.io/clusterfuzzlite/
name: ClusterFuzzLite (batch)

on:
  schedule:
    - cron: "31 4 * * *" # daily at 04:31 UTC
  workflow_dispatch:

permissions: {}

jobs:
  BatchFuzzing:
    name: Batch fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read # checkout
      actions: write # persist the corpus back to the Actions cache
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: javascript
          sanitizer: none

      - name: Run fuzzers
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: 1800
          mode: batch
          sanitizer: none
