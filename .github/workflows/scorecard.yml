# OpenSSF Scorecard — continuous evaluation of the repo's security posture.
# https://github.com/ossf/scorecard
name: Scorecard

on:
  branch_protection_rule:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 2" # Weekly on Tuesday at 05:23 UTC
  push:
    branches: [main]

permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          show-progress: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # A read-only admin PAT lets Scorecard fully evaluate Branch-Protection
          # (the default GITHUB_TOKEN cannot read all protection settings). Create
          # a fine-grained PAT with Administration: read + Metadata: read and store
          # it as the `SCORECARD_TOKEN` repo secret. Falls back to GITHUB_TOKEN when
          # the secret is absent, so this change is safe to merge before the secret
          # exists (Branch-Protection just stays under-reported until then).
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          publish_results: true

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
