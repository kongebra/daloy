<!-- Master source for the DaloyJS square icon / favicon / avatar.
     The three waves echo "daloy" (Filipino for "flow") — request, response,
     and contract moving cleanly through the framework. Sky-blue palette
     matches tailwindcss sky-200/400/700 and the CLI welcome banner. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#0a0a0a" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <g stroke-linecap="round" fill="none" stroke-width="22">
    <path d="M 80 168 C 208 60 304 280 432 168" stroke="#bae6fd" opacity="0.85" />
    <path d="M 80 256 C 208 148 304 368 432 256" stroke="#38bdf8" />
    <path d="M 80 344 C 208 236 304 456 432 344" stroke="#0284c7" />
  </g>
</svg>
